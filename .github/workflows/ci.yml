name: CI

on:
  push:
  pull_request:
    branches: [main]

# REGLA FUNDAMENTAL: si este workflow falla (lint, validate, o test),
# NO se permite push ni merge. Corregir antes de reintentar.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pyyaml

      - name: Check YAML manifests
        run: |
          echo "=== Checking agent manifests ==="
          for f in agents/manifests/*.yaml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "  ✅ $f" || echo "  ❌ $f"
          done

      - name: Check opencode.json is valid JSON
        run: python3 -c "import json; json.load(open('opencode.json'))" && echo "✅ opencode.json is valid"

      - name: Check model-routing config
        run: python3 -c "import json; json.load(open('model-routing.config.json'))" && echo "✅ model-routing.config.json is valid"

      - name: Check models.json
        run: python3 -c "import json; json.load(open('models.json'))" && echo "✅ models.json is valid"

      - name: Verify skills structure
        run: |
          MISSING=0
          for d in skills/*/; do
            if [ -d "$d" ] && [ ! -f "$d/SKILL.md" ]; then
              echo "❌ $d missing SKILL.md"
              MISSING=$((MISSING+1))
            fi
          done
          [ "$MISSING" -eq 0 ] && echo "✅ All skills have SKILL.md" || exit 1

      - name: Validate install.sh syntax
        run: bash -n install.sh && echo "✅ install.sh syntax OK"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
