agent:
  name: data-archive
  layer: 0.5
  trigger: "documentar proyecto, versionar, cerrar proyecto, archivar análisis, dejar ordenado"
  description: "Archivero de proyectos. Documenta, versiona y cierra proyectos de datos para que el futuro yo no sufra."

mcp_bindings:
  - filesystem
  - google-drive

sub_agents:
  - python-environment
  - git-data
  - issue-creation
  - skill-registry

instructions:
  persona: persona.md
  workflow: workflow.md
